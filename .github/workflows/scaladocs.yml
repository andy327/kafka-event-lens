name: Scaladocs

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scaladoc:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Install SBT (via Coursier)
        uses: coursier/setup-action@v3
        with:
          apps: sbt

      - name: Cache Ivy2 and Coursier
        uses: actions/cache@v5
        with:
          path: |
            ~/.ivy2/cache
            ~/.cache/coursier
            ~/.sbt
          key: sbt-${{ runner.os }}-${{ hashFiles('**/build.sbt', '**/project/*.sbt', '**/project/build.properties') }}
          restore-keys: |
            sbt-${{ runner.os }}-

      - name: Generate Scaladoc
        run: sbt doc

      - name: Assemble GitHub Pages site
        run: |
          mkdir -p _site
          for module in common producer processor consumer; do
            if [ -d "$module/target/scala-2.13/api" ]; then
              mkdir -p _site/$module
              cp -r $module/target/scala-2.13/api/. _site/$module/
            fi
          done
          touch _site/.nojekyll
          # Root index linking to each module's docs
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
            <head><meta charset="utf-8"><title>kafka-event-lens — Scaladocs</title></head>
            <body>
              <h1>kafka-event-lens</h1>
              <ul>
                <li><a href="common/">common</a></li>
                <li><a href="producer/">producer</a></li>
                <li><a href="processor/">processor</a></li>
                <li><a href="consumer/">consumer</a></li>
              </ul>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
